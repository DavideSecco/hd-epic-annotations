<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>HD-EPIC Annotation Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topbar">
  <h1>HD-EPIC Viewer</h1>
  <button class="file-btn" onclick="document.getElementById('video-input').click()">Load video</button>
  <input type="file" id="video-input" accept="video/*" style="display:none">
  <span id="video-name">no video loaded</span>
  <a id="yt-btn" class="file-btn" href="#" target="_blank" rel="noopener" style="display:none">&#9654; YouTube</a>
  <button class="file-btn" onclick="document.getElementById('annotations-input').click()">Load annotations (.pkl/.csv)</button>
  <input type="file" id="annotations-input" accept=".pkl,.pickle,.csv,application/octet-stream,text/csv" style="display:none">
  <span id="csv-name">no annotations loaded</span>
  <button class="file-btn" onclick="document.getElementById('audio-input').click()">Load audio (.csv)</button>
  <input type="file" id="audio-input" accept=".csv,text/csv" style="display:none">
  <span id="audio-name">no audio loaded</span>
  <button class="file-btn" onclick="document.getElementById('recipes-input').click()">Load Recipes (.json)</button>
  <input type="file" id="recipes-input" accept=".json,application/json" style="display:none">
  <span id="step-name">no recipes loaded</span>
  <span id="stats"></span>
</div>

<div id="main">
  <div id="video-panel">
    <div id="video-wrap">
      <div id="drop-hint">
        <span class="big">&#9654;</span>
        <span>Drop a video file here, or use "Load video"</span>
        <span style="font-size:12px;color:#333">Annotations, audio and recipes load automatically</span>
      </div>
      <video id="vid" controls></video>
      <canvas id="bbox-canvas"></canvas>
      <div id="audio-hud"></div>
    </div>
    <div id="timeline-wrap">
      <div id="timeline-track">
        <div id="timeline-progress"></div>
        <svg id="timeline-segments" preserveAspectRatio="none"></svg>
        <div id="timeline-cursor"></div>
      </div>
      <div id="time-labels">
        <span id="t-start">0:00</span>
        <span id="t-cur">0:00</span>
        <span id="t-end">0:00</span>
      </div>
      <div id="timeline-legend">
        <span class="leg-item"><span class="leg-dot" style="background:#9333ea"></span>Activity</span>
        <span class="leg-item"><span class="leg-dot" style="background:#3b82f6"></span>Recipe step</span>
        <span class="leg-item"><span class="leg-dot" style="background:#2a5"></span>Narration</span>
        <span class="leg-item"><span class="leg-dot" style="background:#f5a623"></span>Audio</span>
      </div>
    </div>
  </div>

  <div id="annot-panel">
    <div id="annot-header">Narrations <button class="sec-toggle" data-sec="narrations" title="Collapse/expand">▾</button></div>
    <div id="narrations-body">
      <div id="step-context">Nessuna macro-fase attiva</div>
      <div id="search-wrap">
        <input type="text" id="search" placeholder="Search narrations, audio and recipes steps…">
      </div>
      <div id="annot-list"></div>
    </div>
    <div id="recipe-overview"></div>
    <div id="vqa-panel"></div>
  </div>
</div>

<script src="viewer.js"></script>
</body>
</html>
